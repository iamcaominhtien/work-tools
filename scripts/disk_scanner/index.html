<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
    <title>Phân Tích Dung Lượng Ổ Đĩa</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0f62fe;
            --accent-hover: #0043ce;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --active-bg: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 30px;
        }
        header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title h1 {
            margin: 0 0 6px 0;
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }
        .header-title p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 25px;
        }
        .card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .card-value {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }
        .search-container {
            position: relative;
            margin-bottom: 20px;
            display: none;
        }
        .tree-container {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .tree-header-row {
            display: flex;
            background-color: var(--hover-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tree-header-name { flex: 1; }
        .tree-header-meta {
            display: flex;
            gap: 20px;
        }
        .tree-header-size { min-width: 90px; text-align: right; }
        .tree-header-ratio { min-width: 60px; text-align: right; }
        .tree-header-action { min-width: 90px; text-align: center; }

        .tree-node {
            margin-left: 20px;
        }
        #tree-root > .tree-node {
            margin-left: 0;
        }
        .tree-node-header {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s;
        }
        .tree-node-header:hover {
            background-color: var(--hover-bg);
        }
        .toggle-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            color: var(--text-muted);
            font-size: 10px;
            transition: transform 0.2s;
        }
        .node-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            color: #64748b;
        }
        .node-icon-dir {
            color: #eab308;
        }
        .node-icon-file {
            color: #3b82f6;
        }
        .node-name {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .node-meta {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .node-size {
            min-width: 90px;
            text-align: right;
            font-weight: 600;
            font-size: 13px;
        }
        .node-ratio {
            min-width: 60px;
            text-align: right;
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
        }
        .open-btn {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            color: #475569;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }
        .open-btn:hover {
            background-color: var(--hover-bg);
            border-color: #cbd5e1;
            color: #0f172a;
        }
        .node-children {
            display: block;
        }
        .node-children.collapsed {
            display: none;
        }
        .loading-text {
            padding: 6px 15px 6px 45px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }
        .size-critical { color: #dc2626; }
        .size-heavy { color: #ea580c; }
        .size-normal { color: #0f766e; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1 id="root-path">Đang tải...</h1>
                <p>Phân tích bộ nhớ & quản lý thư mục trực quan (Lazy Loading)</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <div class="card-title">Tổng dung lượng</div>
                <div class="card-value" id="stat-size">-</div>
            </div>
            <div class="card">
                <div class="card-title">Số tệp</div>
                <div class="card-value" id="stat-files">-</div>
            </div>
            <div class="card">
                <div class="card-title">Số thư mục</div>
                <div class="card-value" id="stat-dirs">-</div>
            </div>
            <div class="card">
                <div class="card-title">Lỗi truy cập</div>
                <div class="card-value" id="stat-errors">-</div>
            </div>
            <div class="card">
                <div class="card-title">Thời gian quét</div>
                <div class="card-value" id="stat-time">-</div>
            </div>
        </div>

        <div class="tree-container">
            <div class="tree-header-row">
                <div class="tree-header-name">Tên mục</div>
                <div class="tree-header-meta">
                    <div class="tree-header-size">Dung lượng</div>
                    <div class="tree-header-ratio">Tỉ lệ</div>
                    <div class="tree-header-action">Thao tác</div>
                </div>
            </div>
            <div id="tree-root">
                <!-- Dynamic tree content loaded here -->
            </div>
        </div>
    </div>

    <script>
        let fullData = null;

        const FOLDER_SVG = `<svg class="node-icon-dir" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 18H4V8h16v10zm-3-12H9l-2-2H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2z"/></svg>`;
        const FILE_SVG = `<svg class="node-icon-file" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>`;
        const EXTERNAL_SVG = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`;

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const val = bytes / Math.pow(k, i);
            return (i === 0 ? val : val.toFixed(2)) + ' ' + sizes[i];
        }

        function sizeClass(bytes) {
            if (bytes >= 1024*1024*1024) return 'size-critical';
            if (bytes >= 100*1024*1024) return 'size-heavy';
            return 'size-normal';
        }

        async function init() {
            try {
                const response = await fetch('/api/data');
                fullData = await response.json();
                renderStats(fullData.stats);
                document.getElementById('root-path').innerText = `${fullData.root.path}`;
                
                const container = document.getElementById('tree-root');
                container.innerHTML = '';
                
                renderNode(fullData.root, container, fullData.root.size, true);
            } catch (err) {
                console.error(err);
                document.getElementById('tree-root').innerText = 'Lỗi khi tải dữ liệu từ máy chủ.';
            }
        }

        function renderStats(stats) {
            document.getElementById('stat-size').innerText = formatBytes(stats.total_size);
            document.getElementById('stat-files').innerText = stats.total_files.toLocaleString();
            document.getElementById('stat-dirs').innerText = stats.total_dirs.toLocaleString();
            document.getElementById('stat-errors').innerText = stats.errors;
            document.getElementById('stat-time').innerText = `${stats.elapsed.toFixed(3)}s`;
        }

        function renderNode(node, container, parentSize, isRootNode = false) {
            const nodeEl = document.createElement('div');
            nodeEl.className = 'tree-node';

            const headerEl = document.createElement('div');
            headerEl.className = 'tree-node-header';

            const ratio = parentSize > 0 ? ((node.size / parentSize) * 100) : 0;
            const ratioStr = ratio.toFixed(1) + '%';
            
            const isDir = node.is_dir;
            const hasChildren = node.has_children;
            
            const toggleIcon = document.createElement('span');
            toggleIcon.className = 'toggle-icon';
            toggleIcon.innerHTML = isDir ? (hasChildren ? '▶' : '•') : ' ';
            if (isDir && hasChildren) {
                toggleIcon.style.transform = 'rotate(-90deg)';
            }
            headerEl.appendChild(toggleIcon);

            const iconEl = document.createElement('span');
            iconEl.className = 'node-icon';
            iconEl.innerHTML = isDir ? FOLDER_SVG : FILE_SVG;
            headerEl.appendChild(iconEl);

            const nameEl = document.createElement('span');
            nameEl.className = 'node-name';
            nameEl.innerText = node.name || node.path;
            headerEl.appendChild(nameEl);

            const metaEl = document.createElement('div');
            metaEl.className = 'node-meta';

            const sizeEl = document.createElement('span');
            sizeEl.className = `node-size ${sizeClass(node.size)}`;
            sizeEl.innerText = formatBytes(node.size);
            metaEl.appendChild(sizeEl);

            const ratioEl = document.createElement('span');
            ratioEl.className = 'node-ratio';
            ratioEl.innerText = ratioStr;
            metaEl.appendChild(ratioEl);

            const actionContainer = document.createElement('div');
            actionContainer.className = 'tree-header-action';
            
            const openBtn = document.createElement('button');
            openBtn.className = 'open-btn';
            openBtn.innerHTML = `Mở ${EXTERNAL_SVG}`;
            openBtn.onclick = (e) => {
                e.stopPropagation();
                openPath(node.path);
            };
            actionContainer.appendChild(openBtn);
            metaEl.appendChild(actionContainer);

            headerEl.appendChild(metaEl);
            nodeEl.appendChild(headerEl);

            if (isDir && hasChildren) {
                const childrenEl = document.createElement('div');
                childrenEl.className = 'node-children collapsed';
                nodeEl.appendChild(childrenEl);

                let loaded = false;

                const loadAndToggle = async () => {
                    const collapsed = childrenEl.classList.contains('collapsed');
                    
                    if (collapsed && !loaded) {
                        const loadingEl = document.createElement('div');
                        loadingEl.className = 'loading-text';
                        loadingEl.innerText = 'Đang tải dữ liệu...';
                        childrenEl.appendChild(loadingEl);
                        
                        childrenEl.classList.remove('collapsed');
                        toggleIcon.innerHTML = '▼';
                        toggleIcon.style.transform = 'none';

                        try {
                            const response = await fetch(`/api/children?path=${encodeURIComponent(node.path)}`);
                            const children = await response.json();
                            
                            childrenEl.innerHTML = '';
                            
                            children.forEach(child => {
                                renderNode(child, childrenEl, node.size);
                            });
                            loaded = true;
                        } catch (err) {
                            loadingEl.innerText = 'Lỗi tải dữ liệu mục con.';
                            console.error(err);
                        }
                    } else {
                        childrenEl.classList.toggle('collapsed');
                        if (childrenEl.classList.contains('collapsed')) {
                            toggleIcon.innerHTML = '▶';
                            toggleIcon.style.transform = 'rotate(-90deg)';
                        } else {
                            toggleIcon.innerHTML = '▼';
                            toggleIcon.style.transform = 'none';
                        }
                    }
                };

                headerEl.onclick = loadAndToggle;

                if (isRootNode) {
                    loadAndToggle();
                }
            } else {
                headerEl.onclick = () => {
                    openPath(node.path);
                };
            }

            container.appendChild(nodeEl);
        }

        async function openPath(path) {
            try {
                await fetch('/api/open', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                });
            } catch (err) {
                console.error("Lỗi khi mở đường dẫn", err);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
